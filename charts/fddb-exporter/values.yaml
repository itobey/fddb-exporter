replicaCount: 1

image:
  repository: ghcr.io/itobey/fddb-exporter/fddb-exporter
  tag: "1.2.0"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: { }
  name: ""

podAnnotations: { }

podSecurityContext: { }
# fsGroup: 2000

securityContext: { }
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
# runAsUser: 1000

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: ""
    #annotations:
  #traefik.ingress.kubernetes.io/router.middlewares: default-collection@kubernetescrd
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: [ ]
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: { }
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
#   memory: 128Mi

nodeSelector: { }

tolerations: [ ]

affinity: { }

probes:
  liveness:
    enabled: true
    path: /actuator/health/liveness
    port: http
    initialDelaySeconds: 25
    periodSeconds: 600
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1
  readiness:
    enabled: true
    path: /actuator/health/readiness
    port: http
    initialDelaySeconds: 20
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1

mongodb:
  host: "localhost"
  port: "27017"
  database: "database"
  username: "username"

fddb:
  auth:
    secretRef:
      name: fddb-exporter-secret

# Prometheus Operator PodMonitor
podMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  path: /metrics
